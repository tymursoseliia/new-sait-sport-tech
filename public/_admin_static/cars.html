<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Волга-Авто | Панель администратора - Автомобили</title>
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=Unbounded:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* Стили из index.html дублируются для простоты. В реальном проекте выносится в admin.css */
        :root {
            --color-bg: #f1f5f9;
            --color-sidebar: #050914;
            /* Carbon Black */
            --color-accent: #0044CC;
            /* Electric Azure */
            --color-text-main: #0B1121;
            /* Dark Carbon */
            --color-white: #ffffff;
            --border-radius: 8px;
            --font-main: 'Golos Text', sans-serif;
            --font-heading: 'Unbounded', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background-color: var(--color-bg);
            color: var(--color-text-main);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background-color: var(--color-sidebar);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .sidebar-logo {
            padding: 0 20px 30px;
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 800;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .sidebar-logo span {
            color: var(--color-accent);
        }

        .nav-item {
            padding: 15px 20px;
            color: #cbd5e1;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
            border-left: 4px solid var(--color-accent);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        .logout-btn {
            margin-top: auto;
            background: none;
            border: none;
            color: #ef4444;
            padding: 15px 20px;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background-color: rgba(239, 68, 68, 0.1);
        }

        .logout-btn svg {
            width: 20px;
            height: 20px;
        }

        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            max-height: 100vh;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: #0f172a;
            margin: 0;
        }

        .btn-primary {
            background-color: var(--color-accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .table-container {
            background: var(--color-white);
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f8fafc;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        td {
            color: #0f172a;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .car-image {
            width: 80px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            background: #e2e8f0;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .btn-edit {
            color: var(--color-accent);
        }

        .btn-edit:hover {
            background: #e0f2fe;
        }

        .btn-delete {
            color: #ef4444;
        }

        .btn-delete:hover {
            background: #fee2e2;
        }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 600px;
            border-radius: var(--border-radius);
            padding: 30px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            margin: 0;
            font-family: var(--font-heading);
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #475569;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-group.full-width {
            grid-column: span 2;
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo"><span>Волга</span>Авто</div>
        <a href="/admin/index.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg> Дашборд
        </a>
        <a href="/admin/cars.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                <rect x="9" y="9" width="6" height="6"></rect>
                <line x1="9" y1="1" x2="9" y2="4"></line>
                <line x1="15" y1="1" x2="15" y2="4"></line>
                <line x1="9" y1="20" x2="9" y2="23"></line>
                <line x1="15" y1="20" x2="15" y2="23"></line>
                <line x1="20" y1="9" x2="23" y2="9"></line>
                <line x1="20" y1="14" x2="23" y2="14"></line>
                <line x1="1" y1="9" x2="4" y2="9"></line>
                <line x1="1" y1="14" x2="4" y2="14"></line>
            </svg> Автомобили
        </a>
        <a href="/admin/reviews.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg> Отзывы
        </a>
        <a href="/" target="_blank" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg> Сайт
        </a>

        <button class="logout-btn" id="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg> Выйти
        </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Автомобили в наличии</h1>
            <button class="btn-primary" id="open-modal-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg> Добавить авто
            </button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Фото</th>
                        <th>Марка и Модель</th>
                        <th>Год</th>
                        <th>Цена</th>
                        <th>Пробег</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="cars-table-body">
                    <tr>
                        <td colspan="6" style="text-align:center;">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Form Modal -->
    <div class="modal-overlay" id="car-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Добавить авто</h2>
                <button class="btn-close" id="close-modal-btn">&times;</button>
            </div>
            <form id="car-form">
                <input type="hidden" id="car-id">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Бренд</label>
                        <input type="text" id="brand" required>
                    </div>
                    <div class="form-group">
                        <label>Модель</label>
                        <input type="text" id="model" required>
                    </div>
                    <div class="form-group">
                        <label>Год</label>
                        <input type="number" id="year" required>
                    </div>
                    <div class="form-group">
                        <label>Цена (₽)</label>
                        <input type="number" id="price" required>
                    </div>
                    <div class="form-group">
                        <label>Пробег (км)</label>
                        <input type="number" id="mileage" required>
                    </div>
                    <div class="form-group">
                        <label>Объем (л)</label>
                        <input type="number" step="0.1" id="engine_volume" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Ссылка на главное фото (URL)</label>
                        <input type="url" id="main_image" placeholder="https://...">
                    </div>
                    <div class="form-group full-width">
                        <label>Статус</label>
                        <select id="status" required>
                            <option value="В пути / На СВХ">В пути / На СВХ</option>
                            <option value="Под заказ">Под заказ</option>
                            <option value="В наличии">В наличии</option>
                        </select>
                    </div>
                </div>

                <div style="text-align: right;">
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { supabase } from '/src/db.js';

        let carsData = [];

        async function checkAuth() {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (error || !session) window.location.href = '/admin/login.html';
        }

        async function loadCars() {
            const tbody = document.getElementById('cars-table-body');
            const { data, error } = await supabase.from('cars').select('*').order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="6" style="color:red;text-align:center;">Ошибка загрузки</td></tr>`;
                return;
            }

            carsData = data;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">Нет данных</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(car => `
                <tr>
                    <td><img src="${car.main_image || '/img/catalog_bmw_m8_1772189040413.png'}" class="car-image"></td>
                    <td>${car.brand} ${car.model}</td>
                    <td>${car.year}</td>
                    <td>${new Intl.NumberFormat('ru-RU').format(car.price)} ₽</td>
                    <td>${car.mileage} км</td>
                    <td><span style="font-size:0.8rem; background:#e2e8f0; color:#475569; padding:4px 8px; border-radius:4px; font-weight:600;">${car.status || 'В пути / На СВХ'}</span></td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-icon btn-edit" onclick="editCar('${car.id}')" title="Редактировать">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button class="btn-icon btn-delete" onclick="deleteCar('${car.id}')" title="Удалить">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Global functions for inline HTML onclick handlers
        window.editCar = (id) => {
            const car = carsData.find(c => c.id === id);
            if (!car) return;
            document.getElementById('modal-title').textContent = 'Редактировать авто';
            document.getElementById('car-id').value = car.id;
            document.getElementById('brand').value = car.brand || '';
            document.getElementById('model').value = car.model || '';
            document.getElementById('year').value = car.year || '';
            document.getElementById('price').value = car.price || '';
            document.getElementById('mileage').value = car.mileage || '';
            document.getElementById('engine_volume').value = car.engine_volume || '';
            document.getElementById('main_image').value = car.main_image || '';
            document.getElementById('status').value = car.status || 'В пути / На СВХ';

            document.getElementById('car-modal').classList.add('active');
        };

        window.deleteCar = async (id) => {
            if (confirm('Вы уверены, что хотите удалить этот автомобиль?')) {
                const { error } = await supabase.from('cars').delete().eq('id', id);
                if (error) alert('Ошибка удаления!');
                else loadCars();
            }
        };

        // Modal Logic
        const modal = document.getElementById('car-modal');

        document.getElementById('open-modal-btn').addEventListener('click', () => {
            document.getElementById('car-form').reset();
            document.getElementById('car-id').value = '';
            document.getElementById('modal-title').textContent = 'Добавить авто';
            modal.classList.add('active');
        });

        document.getElementById('close-modal-btn').addEventListener('click', () => {
            modal.classList.remove('active');
        });

        // Form Submit
        document.getElementById('car-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const payload = {
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                year: parseInt(document.getElementById('year').value),
                price: parseInt(document.getElementById('price').value),
                mileage: parseInt(document.getElementById('mileage').value),
                engine_volume: parseFloat(document.getElementById('engine_volume').value),
                main_image: document.getElementById('main_image').value,
                currency: 'RUB',
                status: document.getElementById('status').value
            };

            const id = document.getElementById('car-id').value;
            let res;

            if (id) {
                // Update
                res = await supabase.from('cars').update(payload).eq('id', id);
            } else {
                // Insert
                res = await supabase.from('cars').insert([payload]);
            }

            if (res.error) alert('Ошибка сохранения: ' + res.error.message);
            else {
                modal.classList.remove('active');
                loadCars();
            }
        });

        // Init
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/admin/login.html';
        });

        checkAuth().then(loadCars);
    </script>
</body>

</html>

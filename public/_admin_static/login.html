<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Волга-Авто | Панель управления</title>
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=Unbounded:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-bg: #f8fafc;
            --color-primary-dark: #0f172a;
            --color-accent: #0284c7;
            --color-text-main: #1e293b;
            --color-white: #ffffff;
            --border-radius: 12px;
            --font-main: 'Golos Text', sans-serif;
            --font-heading: 'Unbounded', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background-color: var(--color-bg);
            color: var(--color-text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            background-color: var(--color-white);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--color-primary-dark);
            margin-bottom: 5px;
        }

        .login-logo span {
            color: var(--color-accent);
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--color-accent);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: var(--color-accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }

        .btn-login:hover {
            background-color: #0369a1;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 15px;
            min-height: 20px;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-logo"><span>Волга</span>Авто</div>
        <div class="login-subtitle">Доступ в панель управления</div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="admin@volga-auto.ru">
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login" id="login-btn">Войти</button>
            <div class="error-message" id="error-msg"></div>
        </form>
    </div>

    <!-- Auth Logic -->
    <script type="module">
        import { supabase } from '/src/db.js';

        // Check if already logged in
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = '/admin/index.html';
            }
        }
        checkSession();

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.textContent = 'Загрузка...';
            loginBtn.disabled = true;
            errorMsg.textContent = '';

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.textContent = 'Ошибка входа: ' + error.message;
                loginBtn.textContent = 'Войти';
                loginBtn.disabled = false;
            } else {
                window.location.href = '/admin/index.html';
            }
        });
    </script>
</body>

</html>

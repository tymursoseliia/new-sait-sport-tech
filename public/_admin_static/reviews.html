<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Волга-Авто | Панель администратора - Отзывы</title>
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=Unbounded:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* Стили из index.html дублируются для простоты. */
        :root {
            --color-bg: #f1f5f9;
            --color-sidebar: #050914;
            /* Carbon Black */
            --color-accent: #0044CC;
            /* Electric Azure */
            --color-text-main: #0B1121;
            /* Dark Carbon */
            --color-white: #ffffff;
            --border-radius: 8px;
            --font-main: 'Golos Text', sans-serif;
            --font-heading: 'Unbounded', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background-color: var(--color-bg);
            color: var(--color-text-main);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background-color: var(--color-sidebar);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .sidebar-logo {
            padding: 0 20px 30px;
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 800;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .sidebar-logo span {
            color: var(--color-accent);
        }

        .nav-item {
            padding: 15px 20px;
            color: #cbd5e1;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
            border-left: 4px solid var(--color-accent);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        .logout-btn {
            margin-top: auto;
            background: none;
            border: none;
            color: #ef4444;
            padding: 15px 20px;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background-color: rgba(239, 68, 68, 0.1);
        }

        .logout-btn svg {
            width: 20px;
            height: 20px;
        }

        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            max-height: 100vh;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: #0f172a;
            margin: 0;
        }

        .btn-primary {
            background-color: var(--color-accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .table-container {
            background: var(--color-white);
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f8fafc;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        td {
            color: #0f172a;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .review-text-preview {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-success {
            background: #dcfce3;
            color: #166534;
        }

        .badge-warning {
            background: #fef08a;
            color: #854d0e;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .btn-edit {
            color: var(--color-accent);
        }

        .btn-edit:hover {
            background: #e0f2fe;
        }

        .btn-delete {
            color: #ef4444;
        }

        .btn-delete:hover {
            background: #fee2e2;
        }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 600px;
            border-radius: var(--border-radius);
            padding: 30px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            margin: 0;
            font-family: var(--font-heading);
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #64748b;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #475569;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .form-group.full-width {
            grid-column: span 2;
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo"><span>Волга</span>Авто</div>
        <a href="/admin/index.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg> Дашборд
        </a>
        <a href="/admin/cars.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                <rect x="9" y="9" width="6" height="6"></rect>
                <line x1="9" y1="1" x2="9" y2="4"></line>
                <line x1="15" y1="1" x2="15" y2="4"></line>
                <line x1="9" y1="20" x2="9" y2="23"></line>
                <line x1="15" y1="20" x2="15" y2="23"></line>
                <line x1="20" y1="9" x2="23" y2="9"></line>
                <line x1="20" y1="14" x2="23" y2="14"></line>
                <line x1="1" y1="9" x2="4" y2="9"></line>
                <line x1="1" y1="14" x2="4" y2="14"></line>
            </svg> Автомобили
        </a>
        <a href="/admin/reviews.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg> Отзывы
        </a>
        <a href="/" target="_blank" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg> Сайт
        </a>

        <button class="logout-btn" id="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg> Выйти
        </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Управление отзывами</h1>
            <button class="btn-primary" id="open-modal-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg> Добавить отзыв
            </button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Дашборд</th>
                        <th>Автор</th>
                        <th>Автомобиль</th>
                        <th>Рейтинг</th>
                        <th>Текст</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="reviews-table-body">
                    <tr>
                        <td colspan="7" style="text-align:center;">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Form Modal -->
    <div class="modal-overlay" id="review-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Добавить отзыв</h2>
                <button class="btn-close" id="close-modal-btn">&times;</button>
            </div>
            <form id="review-form">
                <input type="hidden" id="review-id">

                <div class="form-grid">
                    <div class="form-group">
                        <label>Имя автора</label>
                        <input type="text" id="author_name" required>
                    </div>
                    <div class="form-group">
                        <label>Автомобиль</label>
                        <input type="text" id="car_name" required placeholder="Например: BMW M8">
                    </div>

                    <div class="form-group">
                        <label>Платформа</label>
                        <select id="platform">
                            <option value="google">Google</option>
                            <option value="yandex">Яндекс</option>
                            <option value="2gis">2GIS</option>
                            <option value="avito">Avito</option>
                            <option value="drom">Drom</option>
                            <option value="otzovik">Отзовик</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Рейтинг (1-5)</label>
                        <input type="number" id="rating" min="1" max="5" step="0.5" value="5" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Текст отзыва</label>
                        <textarea id="review_text" rows="4" required></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>Ссылка на фото авто/клиента (необязательно)</label>
                        <input type="url" id="photo_url" placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="is_published" checked> Опубликован
                        </label>
                    </div>
                </div>

                <div style="text-align: right;">
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { supabase } from '/src/db.js';

        let reviewsData = [];

        async function checkAuth() {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (error || !session) window.location.href = '/admin/login.html';
        }

        async function loadReviews() {
            const tbody = document.getElementById('reviews-table-body');
            const { data, error } = await supabase.from('reviews').select('*').order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="7" style="color:red;text-align:center;">Ошибка загрузки</td></tr>`;
                return;
            }

            reviewsData = data;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">Нет данных</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(review => `
                <tr>
                    <td><img src="${review.photo_url || '/img/review_bmw_1772189096095.png'}" width="50" style="border-radius:4px; object-fit: cover;"></td>
                    <td>${review.author_name}</td>
                    <td>${review.car_name || '-'}</td>
                    <td><b style="color:#eab308">${review.rating}</b> / 5</td>
                    <td><div class="review-text-preview">${review.review_text}</div></td>
                    <td>${review.is_published
                    ? '<span class="badge badge-success">Опубл.</span>'
                    : '<span class="badge badge-warning">Скрыт</span>'}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-icon btn-edit" onclick="editReview('${review.id}')" title="Редактировать">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button class="btn-icon btn-delete" onclick="deleteReview('${review.id}')" title="Удалить">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Global functions for inline HTML onclick handlers
        window.editReview = (id) => {
            const review = reviewsData.find(r => r.id === id);
            if (!review) return;
            document.getElementById('modal-title').textContent = 'Редактировать отзыв';
            document.getElementById('review-id').value = review.id;
            document.getElementById('author_name').value = review.author_name || '';
            document.getElementById('car_name').value = review.car_name || '';
            document.getElementById('rating').value = review.rating || 5;
            document.getElementById('platform').value = review.platform || 'google';
            document.getElementById('review_text').value = review.review_text || '';
            document.getElementById('photo_url').value = review.photo_url || '';
            document.getElementById('is_published').checked = review.is_published;

            document.getElementById('review-modal').classList.add('active');
        };

        window.deleteReview = async (id) => {
            if (confirm('Вы уверены, что хотите удалить этот отзыв?')) {
                const { error } = await supabase.from('reviews').delete().eq('id', id);
                if (error) alert('Ошибка удаления!');
                else loadReviews();
            }
        };

        // Modal Logic
        const modal = document.getElementById('review-modal');

        document.getElementById('open-modal-btn').addEventListener('click', () => {
            document.getElementById('review-form').reset();
            document.getElementById('review-id').value = '';
            document.getElementById('modal-title').textContent = 'Добавить отзыв';
            modal.classList.add('active');
        });

        document.getElementById('close-modal-btn').addEventListener('click', () => {
            modal.classList.remove('active');
        });

        // Form Submit
        document.getElementById('review-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const payload = {
                author_name: document.getElementById('author_name').value,
                car_name: document.getElementById('car_name').value,
                rating: parseFloat(document.getElementById('rating').value),
                platform: document.getElementById('platform').value,
                review_text: document.getElementById('review_text').value,
                photo_url: document.getElementById('photo_url').value,
                is_published: document.getElementById('is_published').checked,
            };

            const id = document.getElementById('review-id').value;
            let res;

            if (id) {
                res = await supabase.from('reviews').update(payload).eq('id', id);
            } else {
                res = await supabase.from('reviews').insert([payload]);
            }

            if (res.error) alert('Ошибка сохранения: ' + res.error.message);
            else {
                modal.classList.remove('active');
                loadReviews();
            }
        });

        // Init
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/admin/login.html';
        });

        checkAuth().then(loadReviews);
    </script>
</body>

</html>
